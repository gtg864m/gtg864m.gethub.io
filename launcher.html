<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SAP Work Zone Launcher</title>

  <!-- TeamsJS v2.x (keep simple; add integrity later if you want) -->
  <script src="https://res.cdn.office.net/teams-js/2.2.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>

  <style>
    body { font-family: Segoe UI, Arial, sans-serif; padding: 24px; }
    button { padding: 12px 20px; font-size: 14px; margin-right: 10px; cursor: pointer; }
  </style>
</head>

<body>
  <h3>SAP Work Zone</h3>

  <button onclick="launchWorkZone()">Open Work Zone</button>
  <button onclick="signIn()">Sign in</button>

  <p id="status">Initializing…</p>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const WORKZONE_URL =
        "https://lxu.launchpad.cfapps.us10.hana.ondemand.com/site/PX2#Shell-home";

      const IAS_LOGIN_URL =
        "https://ao16xfgoy.accounts.ondemand.com";

      const statusEl = document.getElementById("status");
      const setStatus = (msg) => { if (statusEl) statusEl.innerText = msg; };

      let inTeams = false;

      // Guard: SDK loaded?
      if (!window.microsoftTeams || !microsoftTeams.app?.initialize) {
        setStatus("Teams SDK not loaded (browser mode).");
      } else {
        // Try initialize. If it resolves, we are in Teams.
        microsoftTeams.app.initialize()
          .then(() => {
            inTeams = true;
            setStatus("Ready (Teams).");
          })
          .catch(() => {
            setStatus("Ready (browser).");
          });
      }

      window.launchWorkZone = function () {
        window.location.href = WORKZONE_URL;
      };

      window.signIn = function () {
        // ✅ If in Teams, use openLink (works even when dialog APIs are unavailable)
        if (inTeams && microsoftTeams.app?.openLink) {
          setStatus("Opening sign-in in Teams browser…");
          microsoftTeams.app.openLink(IAS_LOGIN_URL);
          return;
        }

        // ✅ Browser fallback
        setStatus("Opening sign-in…");
        window.location.href = IAS_LOGIN_URL;
      };

    });
  </script>
</body>
</html>
