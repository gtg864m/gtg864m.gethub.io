<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="/styles/msteams-16.css"/>
    <link rel="stylesheet" type="text/css" href="/styles/custom.css"/>
    <script
          src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"
          integrity="sha384-QtTBFeFlfRDZBfwHJHYQp7MdLJ2C3sfAEB1Qpy+YblvjavBye+q87TELpTnvlXw4"
          crossorigin="anonymous">
    </script>

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      padding: 24px;
    }
    button {
      padding: 12px 20px;
      font-size: 14px;
      margin-right: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h3>SAP Work Zone</h3>

  <button onclick="launchWorkZone()">Open Work Zone</button>
  <button onclick="signIn()">Sign in</button>

  <p id="status">Initializing…</p>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const WORKZONE_URL =
        "https://lxu.launchpad.cfapps.us10.hana.ondemand.com/site/PX2#Shell-home";

      const IAS_LOGIN_URL =
        "https://ao16xfgoy.accounts.ondemand.com";

      const statusEl = document.getElementById("status");
      const setStatus = (msg) => { if (statusEl) statusEl.innerText = msg; };

      // ✅ Guard: SDK must exist
      if (!window.microsoftTeams || !microsoftTeams.app?.initialize) {
        setStatus("Teams SDK not loaded.");
        return;
      }

      let teamsReady = false;

      microsoftTeams.app.initialize()
        .then(() => {
          teamsReady = true;
          setStatus("Ready.");
        })
        .catch(() => {
          setStatus("Not running inside Teams.");
        });

      window.launchWorkZone = function () {
        window.location.href = WORKZONE_URL;
      };

      window.signIn = function () {

        // Browser fallback
        if (!teamsReady) {
          setStatus("Browser sign‑in…");
          window.location.href = IAS_LOGIN_URL;
          return;
        }

        // Teams dialog
        if (microsoftTeams.dialog?.url?.open) {
          setStatus("Opening sign‑in dialog…");

          microsoftTeams.dialog.url.open(
            {
              title: "Sign in to SAP Work Zone",
              url: IAS_LOGIN_URL,
              size: { height: 600, width: 420 }
            },
            () => {
              setStatus("Sign‑in completed. Click 'Open Work Zone'.");
            }
          );
          return;
        }

        setStatus("Dialog API not available.");
      };
    });
  </script>
</body>
</html>
