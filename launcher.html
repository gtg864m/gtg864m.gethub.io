
<script>
const TARGET_URL = "https://lxu.workzone.cfapps.us10.hana.ondemand.com/site#workzone-home&/home";
const statusEl = document.getElementById("status");
const setStatus = (m) => statusEl.textContent = m;

let inTeams = false;

(async function init() {
  try {
    await microsoftTeams.app.initialize();
    inTeams = true;
    setStatus("Ready (Teams).");
  } catch (e) {
    setStatus("Not in Teams.");
  }
})();

document.getElementById("btn").addEventListener("click", async () => {
  setStatus("Opening Teams auth popup…");

  try {
    const result = await microsoftTeams.authentication.authenticate({
      url: TARGET_URL,
      width: 800,
      height: 700
    });
    setStatus("Returned success: " + result);
  } catch (e) {
    // Show EVERYTHING we can
    const msg = (e && (e.message || e.errorMessage)) ? (e.message || e.errorMessage) : String(e);
    setStatus("Auth popup failed: " + msg);
    console.log("authenticate() full error:", e);
  }
});
</script>
