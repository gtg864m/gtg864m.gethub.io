<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Auth Start</title>
  <script src="https://res.cdn.office.net/teams-js/2.2.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
</head>
<body>
  Redirecting…
  <script>
    const DEFAULT_TARGET = "https://lxu.workzone.cfapps.us10.hana.ondemand.com/site#workzone-home&/home";
    const AUTH_END = `${location.origin}/gtg864m/gtg864m.gethub.io/authend.html`;

    const params = new URLSearchParams(location.search);
    const step = params.get("step") || "go";

    // Allows caller to pass a target in the query string
    const target = params.get("target")
      ? decodeURIComponent(params.get("target"))
      : DEFAULT_TARGET;

    // When Work Zone redirects back to us after login, we finish the popup flow
    if (step === "done") {
      // Initialize Teams SDK (safe even if it fails in browser testing)
      (async () => {
        try { await microsoftTeams.app.initialize(); } catch(e) {}
        window.location.replace(AUTH_END);
      })();
    } else {
      // First leg: go to Work Zone to trigger IAS/SSO
      // Build a "return to me" URL (this is what Work Zone/IAS must send the browser back to)
      const returnUrl = `${location.origin}${location.pathname}?step=done`;

      // IMPORTANT:
      // 1) If your Work Zone/IAS supports a redirect parameter, you should pass returnUrl through it.
      // 2) Since we don't know your exact param name, we support a placeholder replacement:
      //    If target contains "{RETURN_URL}", we will replace it.
      //
      // Example target passed in:
      //   https://.../site#workzone-home&/home?someRedirectParam={RETURN_URL}
      //
      const finalTarget = target.includes("{RETURN_URL}")
        ? target.replaceAll("{RETURN_URL}", encodeURIComponent(returnUrl))
        : target;

      window.location.replace(finalTarget);
    }
  </script>
</body>
</html>
