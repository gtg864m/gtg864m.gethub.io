<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Auth End</title>
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
</head>

<body style="font-family: Segoe UI, Arial, sans-serif; padding: 16px;">
  Completing sign-in…

  <script>
    (async () => {
      try {
        await microsoftTeams.app.initialize();

        // Return an optional payload string to the caller (.then(result => ...))
        const payload = JSON.stringify({
          status: "success",
          ts: new Date().toISOString()
        });

        microsoftTeams.authentication.notifySuccess(payload);
      } catch (e) {
        microsoftTeams.authentication.notifyFailure(
          JSON.stringify({
            status: "failure",
            message: (e && e.message) ? e.message : String(e)
          })
        );
      }
    })();
  </script>
</body>
</html>
