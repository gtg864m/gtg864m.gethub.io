
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Work Zone Launcher</title>

  <!-- Microsoft Teams SDK -->
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 520px;
      margin: 80px auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
    }
    button {
      padding: 12px 24px;
      font-size: 15px;
      cursor: pointer;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>SAP Work Zone</h2>

    <button id="launchBtn" onclick="handleLaunch()" disabled>
      Go to Work Zone
    </button>

    <div class="status" id="status">
      Checking session…
    </div>
  </div>

  <script>
    /**********************************************************
     * CONFIG
     **********************************************************/
    const WORKZONE_URL = "https://lxu.launchpad.cfapps.us10.hana.ondemand.com/site/PX2";
    const IAS_LOGIN_URL = "https://<your-ias-domain>/login";
    const BACKEND_TOKEN_VALIDATE = "/api/validate-teams-token";

    let teamsTokenValid = false;

    /**********************************************************
     * INIT
     **********************************************************/
    microsoftTeams.app.initialize().then(() => {
      attemptTeamsSSO();
    });

    /**********************************************************
     * TRY TEAMS SSO (NON‑BLOCKING)
     **********************************************************/
    function attemptTeamsSSO() {
      microsoftTeams.authentication.getAuthToken({ silent: true })
        .then(token => validateTokenWithBackend(token))
        .catch(() => {
          setSignedOutState();
        });
    }

    /**********************************************************
     * BACKEND VALIDATION
     **********************************************************/
    function validateTokenWithBackend(token) {
      fetch(BACKEND_TOKEN_VALIDATE, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json"
        }
      })
      .then(resp => {
        if (!resp.ok) throw new Error("Invalid");
        teamsTokenValid = true;
        setReadyState();
      })
      .catch(() => {
        setSignedOutState();
      });
    }

    /**********************************************************
     * UI STATES
     **********************************************************/
    function setReadyState() {
      document.getElementById("launchBtn").disabled = false;
      document.getElementById("status").innerText =
        "Session ready.";
    }

    function setSignedOutState() {
      document.getElementById("launchBtn").disabled = false;
      document.getElementById("status").innerText =
        "You may be asked to sign in.";
    }

    /**********************************************************
     * USER ACTION
     **********************************************************/
    function handleLaunch() {
      if (teamsTokenValid) {
        // Fast path — no redirect surprises
        window.location.replace(WORKZONE_URL);
      } else {
        // Explicit interactive auth
        openAuthTaskModule();
      }
    }

    /**********************************************************
     * TASK MODULE FALLBACK (IAS → ENTRA)
     **********************************************************/
    function openAuthTaskModule() {
      microsoftTeams.dialog.open(
        {
          title: "Sign in to Work Zone",
          url: IAS_LOGIN_URL,
          size: { height: 600, width: 420 }
        },
        result => {
          if (result === "success") {
            window.location.reload();
          }
        }
      );
    }
  </script>
</body>
</html>
