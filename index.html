
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Launching Work Zone…</title>

  <!-- Microsoft Teams SDK -->
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }
    .container {
      max-width: 520px;
      margin: 80px auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
    }
    button {
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container" id="ui">
    <p>Checking your session…</p>
  </div>

  <script>
    /**********************************************************
     * CONFIG
     **********************************************************/
    const WORKZONE_URL = "https://lxu.launchpad.cfapps.us10.hana.ondemand.com/site/PX2";
    const IAS_LOGIN_URL = "https://<your-ias-domain>/login";
    const BACKEND_TOKEN_VALIDATE = "/api/validate-teams-token";

    let teamsContext = null;

    /**********************************************************
     * ENTRY POINT
     **********************************************************/
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.app.getContext().then(context => {
        teamsContext = context;
        attemptTeamsSSO();
      });
    });

    /**********************************************************
     * PRIMARY PATH – Teams SSO (only supported silent path)
     **********************************************************/
    function attemptTeamsSSO() {
      microsoftTeams.authentication.getAuthToken({ silent: true })
        .then(token => validateTokenWithBackend(token))
        .catch(err => {
          console.warn("Teams SSO failed", err);
          renderSignedOut();
        });
    }

    /**********************************************************
     * BACKEND VALIDATION
     * (Never pass token to IAS)
     **********************************************************/
    function validateTokenWithBackend(token) {
      fetch(BACKEND_TOKEN_VALIDATE, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json"
        }
      })
      .then(resp => {
        if (!resp.ok) throw new Error("Token invalid");
        return resp.json();
      })
      .then(() => launchWorkZone())
      .catch(err => {
        console.warn("Token validation failed", err);
        renderSignedOut();
      });
    }

    /**********************************************************
     * SUCCESS PATH – Load Work Zone
     **********************************************************/
    function launchWorkZone() {
      window.location.replace(WORKZONE_URL);
    }

    /**********************************************************
     * FALLBACK UI – Resume‑Safe State
     **********************************************************/
    function renderSignedOut() {
      const ui = document.getElementById("ui");
      ui.innerHTML = `
        <h3>Session expired</h3>
        <p>To continue securely, please sign in again.</p>
        <button onclick="openAuthTaskModule()">Continue</button>
      `;
    }

    /**********************************************************
     * INTERACTIVE FALLBACK – Task Module → IAS → Entra
     **********************************************************/
    function openAuthTaskModule() {
      microsoftTeams.dialog.open(
        {
          title: "Sign in",
          url: IAS_LOGIN_URL,
          size: { height: 600, width: 400 }
        },
        result => {
          if (result === "success") {
            // Clean restart after authentication
            window.location.reload();
          }
        }
      );
    }
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Opening SAP Inbox...</title>

  <!-- Teams SDK -->
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

  <script>
    // 🔧 CONFIG — Put your real Fiori Inbox URL here
    const FIORI_URL = "https://lxu.launchpad.cfapps.us10.hana.ondemand.com/site/PX2#WorkflowTask-displayInbox?allItems=true&sap-ui-app-id-hint=px2100";

    // Initialize Teams SDK
    microsoftTeams.app.initialize();

    // Reload page when user comes back to the tab
    microsoftTeams.app.registerOnResumeHandler(() => {
      console.log("Teams tab resumed, reloading page...");
      window.location.href = FIORI_URL;
    });

    // Function to check if the session expired (redirected to login)
    function checkAuth() {
      const url = window.location.href.toLowerCase();
      if (url.includes("login") || url.includes("auth")) {
        console.log("Detected login page, reloading iframe...");
        window.location.href = FIORI_URL;
      }
    }

    // Periodically check session
    setInterval(checkAuth, 5000);

    // Backup: reload before SAP session timeout
    setTimeout(() => {
      console.log("Periodic reload before session timeout");
      window.location.href = FIORI_URL;
    }, 1000 * 60 * 25); // 25 minutes
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f3f2f1;
    }
    .box {
      text-align: center;
      padding: 30px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .spinner {
      margin: 20px auto;
      width: 30px;
      height: 30px;
      border: 4px solid #ddd;
      border-top: 4px solid #0078d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    a {
      display: inline-block;
      margin-top: 15px;
      color: #0078d4;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Opening SAP Inbox...</h2>
    <div class="spinner"></div>

    <!-- Manual fallback -->
    <a href="https://lxu.launchpad.cfapps.us10.hana.ondemand.com/site/PX2#WorkflowTask-displayInbox?allItems=true&sap-ui-app-id-hint=px2100" target="_blank">
      Click here if nothing happens
    </a>
  </div>

  <script>
    // Initial load of Fiori inside iframe
    window.onload = function() {
      // Only navigate if not already inside the Fiori URL
      if (window.location.href !== FIORI_URL) {
        window.location.href = FIORI_URL;
      }
    };
  </script>
</body>
</html>
