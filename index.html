<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Opening SAP Inbox...</title>

  <script>
    // 🔧 CONFIG — Put your real Fiori Inbox URL here
    const FIORI_URL = "https://lxu.launchpad.cfapps.us10.hana.ondemand.com/site/PX2#WorkflowTask-displayInbox?allItems=true&sap-ui-app-id-hint=px2100";

    // Open Fiori Inbox in new tab / top window
    function openInbox() {
      try {
        const newWindow = window.open(FIORI_URL, "_blank", "noopener,noreferrer");
        if (!newWindow) {
          // Popup blocked fallback
          top.location.href = FIORI_URL;
        }
      } catch (e) {
        // Hard fallback
        top.location.href = FIORI_URL;
      }
    }

    // Check if user is on login page / session expired
    function checkAuth() {
      const url = window.location.href.toLowerCase();
      if (url.includes("login") || url.includes("auth")) {
        try {
          if (window.top !== window.self) {
            // Escape iframe and reload top-level
            window.top.location.href = FIORI_URL;
          } else {
            window.location.href = FIORI_URL;
          }
        } catch (e) {
          window.location.href = FIORI_URL;
        }
      }
    }

    // Run on load
    window.onload = function () {
      // Launch Fiori Inbox immediately
      openInbox();

      // Force top-level navigation in case Teams iframe interferes
      if (window.top !== window.self) {
        window.top.location.href = FIORI_URL;
      }

      // Periodically check for expired session / login page
      setInterval(checkAuth, 5000);

      // Backup: refresh every 25 minutes to prevent timeout
      setTimeout(() => {
        if (window.top !== window.self) {
          window.top.location.href = FIORI_URL;
        } else {
          window.location.href = FIORI_URL;
        }
      }, 1000 * 60 * 25);
    };
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f3f2f1;
    }
    .box {
      text-align: center;
      padding: 30px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .spinner {
      margin: 20px auto;
      width: 30px;
      height: 30px;
      border: 4px solid #ddd;
      border-top: 4px solid #0078d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    a {
      display: inline-block;
      margin-top: 15px;
      color: #0078d4;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Opening SAP Inbox...</h2>
    <div class="spinner"></div>

    <!-- Manual fallback -->
    <a href="https://your-domain.workzone.site/shell#MyInbox-display" target="_blank">
      Click here if nothing happens
    </a>
  </div>
</body>
</html>
